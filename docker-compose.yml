version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: court-admin-mysql
    ports:
      - "9003:3306"
    environment:
      MYSQL_ROOT_PASSWORD: court_admin_root_2026
      MYSQL_DATABASE: court_admin
      MYSQL_USER: court_admin
      MYSQL_PASSWORD: court_admin_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - court-admin
    restart: unless-stopped

  # 后端服务
  backend:
    build: ./backend
    container_name: court-admin-backend
    ports:
      - "9001:8000"
    environment:
      DATABASE_URL: mysql+pymysql://court_admin:court_admin_2026@mysql:3306/court_admin
      OPENCLAW_CONFIG_PATH: /root/.openclaw/openclaw.json
      BACKUP_DIR: /app/data/backups
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - /root/.openclaw:/root/.openclaw
    depends_on:
      - mysql
    networks:
      - court-admin
    restart: unless-stopped

  # 前端服务
  frontend:
    build: ./frontend
    container_name: court-admin-frontend
    ports:
      - "9002:80"
    depends_on:
      - backend
    networks:
      - court-admin
    restart: unless-stopped

  # Nginx 反向代理（生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: court-admin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - court-admin
    profiles:
      - production
    restart: unless-stopped

networks:
  court-admin:
    driver: bridge

volumes:
  mysql_data:
